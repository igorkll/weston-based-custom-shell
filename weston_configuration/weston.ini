[core]
shell=lua

[shell]
background-color=0xff000000
allow-zap=false
panel-position=none
locking=false
binding-modifier=none
animation=none
close-animation=none
startup-animation=none
focus-animation=none
lua-script=/weston_shell.lua

[keyboard]
vt-switching=false

[libinput]
enable-tap=true

[autolaunch]
path=/runshell_launcher.sh
watch=true
